name: bitget-a-tier-anomaly-scanner
display_name: "Bitget A-Tier Anomaly Scanner"
version: "1.0.0"
description: "Signal-only Bitget perpetual anomaly scanner."
long_description: |
  This Playbook is a signal-only market anomaly scanner for liquid Bitget perpetual contracts. It is designed to surface situations where participation, liquidity, price behavior, and trader pressure appear aligned enough to deserve manual review. The strategy is not a black-box auto trader and does not try to force a position on every run. Its purpose is to turn a noisy futures market into a ranked watchlist with one primary directional signal when the evidence is strong enough.

  Entry decisions come from the agreement between several market behavior groups. When participation expands and price action is supported by stronger aggressive buying, the Playbook may emit a long signal. When participation expands while price action weakens and selling pressure dominates, it may emit a short signal. If the evidence is mixed, it emits a watch signal. This lets the scanner stay selective instead of treating every fast move as a trade.

  Exit and risk handling are intentionally conservative in this package. The companion dashboard version uses stop protection, reward targets, cooldowns, and exposure caps. This GetAgent version publishes signal direction and risk context only, so the output should be inspected before any separate trade is considered. It is meant for research, ranking, and paper evidence rather than unattended live execution.

  The main tunable parameters control the scanned universe and selectivity. A broader universe can surface more opportunities but may include noisier contracts. A higher selectivity setting reduces frequency and focuses attention on stronger alignment, while a lower setting makes the scanner more active. The risk settings describe how to interpret the signal in a disciplined process.

  This approach can underperform in choppy markets, sudden news shocks, thin liquidity, exchange data gaps, and conditions where open interest rises for hedging rather than directional conviction. Signals should be treated as structured research output, not guaranteed profit.
market_type: contract
trading_symbols: ["BTCUSDT", "ETHUSDT", "SOLUSDT"]
output_kind: selection_basket
decision_mode: deterministic
backtest_support: none
runtime_profile: deterministic
execution_mode: signal_only
follow_trade_supported: false
official_evidence_kind: paper
tags: ["bitget", "anomaly", "scanner", "signal"]
schedule:
  cron: "0 */4 * * *"
  tz: "Asia/Shanghai"
strategy_config:
  max_assets: 3
user_config_schema:
  max_assets:
    type: integer
    default: 3
    min: 1
    max: 3
    label: "Maximum assets"
